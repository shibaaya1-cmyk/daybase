<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TODO編集</title>
  <link rel="stylesheet" href="./css/todo-edit.css">
</head>
<body>

  <header>
    <h1>TODO編集</h1>
    <button class="btn btn-danger" id="btnDelete">削除</button>
    <button class="btn" id="btnCancel">キャンセル</button>
    <button class="btn btn-primary" id="btnSave">保存</button>
  </header>

  <main>
    <section class="section">
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="tmTitle" placeholder="何をする？">
      </div>
      <div class="row">
        <div class="form-group" style="flex:1">
          <label>開始日</label>
          <input type="date" id="tmStart">
        </div>
        <div class="form-group" style="flex:1">
          <label>〆切日</label>
          <input type="date" id="tmDue">
        </div>
      </div>
      <div class="form-group">
        <label>アイコン</label>
        <select id="tmIcon">
          <option value="">（なし）</option>
          <option>✍️</option><option>📝</option><option>💬</option>
          <option>✅</option><option>❗</option><option>📚</option>
          <option>🏠</option><option>🧹</option><option>🛒</option>
          <option>🚗</option><option>💡</option>
        </select>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="tmMemo" rows="3"></textarea>
      </div>
      <label style="display:flex; align-items:center; gap:8px; font-size:13px;">
        <input type="checkbox" id="tmDone"> このタスクを完了にする
      </label>
    </section>

    <section class="section">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <label style="margin:0">子タスク (サブタスク)</label>
        <button class="btn" id="btnAddSub" style="height:24px; padding:0 8px">+ 追加</button>
      </div>
      <div id="subList"></div>
    </section>
  </main>

  <script src="./js/todo-edit.js"></script>
</body>
</html>
